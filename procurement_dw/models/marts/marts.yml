version: 2

models:
  - name: mrt_procurement_obt
    description: "Modelo de mart que consolida as principais métricas de performance de compras, incluindo análises de risco, qualidade, economia e volume."
    
    columns:
      - name: total_company_savings
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: final_risk_score
        tests:
          - not_null

      - name: supplier_spend_in_category
        tests:
          - not_null
          
      - name: strategic_segment
        tests:
          - accepted_values:
              values: [
                '1 - Immediate Intervention', 
                '2 - Strategic Monitoring', 
                '3 - Operational Risk', 
                '4 - Standard Management']

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - supplier_id
            - category_id
            